<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2026年进口货物物流跟踪表</title>
  <link rel="stylesheet" href="styles.css?v=edit3" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Import Logistics Tracker</p>
      <h1 id="workbook-title">2026年进口货物物流跟踪表</h1>
      <p id="meta" class="meta"></p>
    </div>
    <div class="header-actions">
      <a class="download" href="assets/2026年进口货物物流跟踪表-铁矿协作一部&新拓.xlsx">下载原表</a>
      <button id="export-xls" class="button primary" type="button">导出 Excel</button>
      <button id="export-csv" class="button" type="button">导出当前 CSV</button>
    </div>
  </header>

  <main>
    <section class="toolbar" aria-label="Workbook controls">
      <nav id="tabs" class="tabs" aria-label="Sheets"></nav>
      <div class="search-wrap">
        <input id="search" type="search" placeholder="搜索当前工作表" autocomplete="off" />
        <span id="count" class="count"></span>
      </div>
    </section>
    <section class="editbar" aria-label="Editing controls">
      <button id="undo" class="button" type="button" disabled>撤销</button>
      <button id="redo" class="button" type="button" disabled>重做</button>
      <button id="add-row" class="button" type="button">新增行</button>
      <button id="delete-row" class="button danger" type="button" disabled>删除选中行</button>
      <button id="merge-cells" class="button" type="button" disabled>合并单元格</button>
      <button id="unmerge-cells" class="button" type="button" disabled>取消合并</button>
      <button id="reset-sheet" class="button" type="button">重置当前表</button>
      <button id="reset-all" class="button" type="button">重置全部</button>
      <span id="edit-status" class="edit-status"></span>
    </section>
    <section class="table-shell">
      <table id="sheet-table"></table>
    </section>
  </main>

  <script src="data/workbook.js?v=edit3"></script>
  <script src="app.js?v=edit3"></script>
</body>
</html>
